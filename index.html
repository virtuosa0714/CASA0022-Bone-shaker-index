<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bone-Shaker Web Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            background-color: #263238;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #header h1 {
            margin: 0;
            font-size: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .btn-upload {
            background-color: #3f51b5;
        }

        .btn-clear {
            background-color: #d32f2f;
        }

        #csvFileInput {
            display: none;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
            font-size: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>Bone-Shaker Web Dashboard</h1>
        <div class="controls">
            <button class="btn btn-upload" onclick="document.getElementById('csvFileInput').click()">📂 Import
                CSV</button>
            <button class="btn btn-clear" onclick="clearMap()">🗑️ Clear Map</button>
            <input type="file" id="csvFileInput" accept=".csv" onchange="handleFileUpload(event)">
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. Initialize Map
        const map = L.map('map').setView([51.536, -0.012], 15);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <div class="legend-item"><span class="dot" style="background: red;"></span> Severe Bump (>= 0.45g)</div>
                <div class="legend-item"><span class="dot" style="background: orange;"></span> Moderate Bump (>= 0.30g)</div>
                <div class="legend-item"><div style="width:12px; height:3px; background:blue; display:inline-block;"></div> Route</div>
            `;
            return div;
        };
        legend.addTo(map);

        let mapLayers = L.featureGroup().addTo(map);

        // 2. Data Persistence Logic
        function saveToLocalStorage(routePoints, bumps) {
            localStorage.setItem('boneShakerData', JSON.stringify({ route: routePoints, bumps: bumps }));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('boneShakerData');
            if (saved) {
                const { route, bumps } = JSON.parse(saved);
                renderData(route, bumps);
            }
        }

        function renderData(routePoints, bumps) {
            mapLayers.clearLayers();
            if (routePoints.length > 0) {
                L.polyline(routePoints, { color: '#2196F3', weight: 4, opacity: 0.7 }).addTo(mapLayers);
                map.fitBounds(L.polyline(routePoints).getBounds(), { padding: [50, 50] });
            }
            bumps.forEach(b => {
                const icon = b.type === 'severe' ? { radius: 8, color: 'red', fill: '#ff0000' } : { radius: 5, color: 'orange', fill: '#ffa500' };
                L.circleMarker([b.lat, b.lng], {
                    radius: icon.radius, color: icon.color, fillColor: icon.fill, fillOpacity: 0.8, weight: 1
                }).bindPopup(`<b>${b.type === 'severe' ? 'Severe Bump' : 'Moderate Bump'}</b><br>Impact: ${b.impact}g`).addTo(mapLayers);
            });
        }

        // 3. Process CSV
        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function (e) {
                const rows = e.target.result.split(/\r?\n/);
                let routePoints = [];
                let bumps = [];

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length >= 6) {
                        const accZ = parseFloat(cols[3]);
                        const lat = parseFloat(cols[4]);
                        const lng = parseFloat(cols[5]);
                        if (lat && lng) {
                            routePoints.push([lat, lng]);
                            const dynamicZ = Math.abs(Math.abs(accZ) - 0.98);
                            if (dynamicZ >= 0.45) bumps.push({ lat, lng, impact: dynamicZ.toFixed(2), type: 'severe' });
                            else if (dynamicZ >= 0.30) bumps.push({ lat, lng, impact: dynamicZ.toFixed(2), type: 'moderate' });
                        }
                    }
                }
                renderData(routePoints, bumps);
                saveToLocalStorage(routePoints, bumps);
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function clearMap() {
            localStorage.removeItem('boneShakerData');
            mapLayers.clearLayers();
        }

        window.onload = loadFromLocalStorage;
    </script>
</body>

</html>
